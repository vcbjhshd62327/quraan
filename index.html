<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>القرآن الكريم</title>

<!-- الخط العربي الفخم -->
<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Amiri", serif;
  transition: 0.3s;
}

/* الوضع الداكن */
body.dark {
  background: #0d0d0d;
  color: #f5f5f5;
}

/* الوضع الفاتح */
body.light {
  background: #f5f5f5;
  color: #111;
}

.quran-frame {
  border: 10px solid gold;
  border-radius: 20px;
  margin: 15px;
  padding: 10px;
  box-shadow: 0 0 20px gold;
}

/* الهيدر */
.header {
  text-align: center;
  border-bottom: 2px solid gold;
  padding-bottom: 10px;
}

.surah-name {
  font-size: 26px;
  font-weight: bold;
}

.juz {
  font-size: 16px;
}

/* أدوات التحكم */
.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px 0;
}

select, button {
  padding: 8px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* البسملة */
.basmala {
  text-align: center;
  font-size: 22px;
  margin: 15px 0;
  color: gold;
}

/* الآيات */
.quran-container {
  overflow: auto;
  max-height: 65vh;
  padding: 15px;
  direction: rtl;
}

.ayah {
  display: inline;
  font-size: 22px;
  line-height: 2.2;
}

.ayah-number {
  color: gold;
}

/* الفوتر */
.footer {
  text-align: center;
  border-top: 2px solid gold;
  padding-top: 10px;
  margin-top: 10px;
}
</style>

</head>

<body class="dark">

<div class="quran-frame">

  <div class="header">
    <div class="surah-name" id="surahName"></div>
    <div class="juz" id="juzNumber"></div>
  </div>

  <div class="controls">
    <select id="surahSelect"></select>
    <button onclick="toggleMode()">🌙/☀️</button>
  </div>

  <div class="basmala">بسم الله الرحمن الرحيم</div>

  <div class="quran-container" id="quran"></div>

  <div class="footer" id="pageNumber"></div>

</div>

<script>

// قائمة السور
const surahs = [
"الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
"هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
"الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
"لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
"فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
"الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
"الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
"نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
"التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
"الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
"القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر",
"المسد","الإخلاص","الفلق","الناس"
];

// ملء القائمة
let select = document.getElementById("surahSelect");
surahs.forEach((s, i) => {
  let option = document.createElement("option");
  option.value = i + 1;
  option.text = (i+1) + " - " + s;
  select.appendChild(option);
});

// تحميل آخر قراءة
let lastSurah = localStorage.getItem("lastSurah") || 1;
select.value = lastSurah;
loadSurah(lastSurah);

// عند تغيير السورة
select.onchange = () => {
  let num = select.value;
  localStorage.setItem("lastSurah", num);
  loadSurah(num);
};

// تحميل السورة
function loadSurah(num) {
  fetch(`https://api.alquran.cloud/v1/surah/${num}`)
  .then(res => res.json())
  .then(data => {

    let surah = data.data;
    let ayat = surah.ayahs;

    document.getElementById("surahName").innerText = "سورة " + surah.name;
    document.getElementById("juzNumber").innerText = "الجزء " + ayat[0].juz;

    let content = "";

    ayat.forEach(a => {
      content += `<span class="ayah">${a.text} <span class="ayah-number">(${a.numberInSurah})</span></span>`;
    });

    document.getElementById("quran").innerHTML = content;
    document.getElementById("pageNumber").innerText = "صفحة " + ayat[0].page;

  });
}

// الوضع الليلي / النهاري
function toggleMode() {
  let body = document.body;
  if(body.classList.contains("dark")){
    body.classList.remove("dark");
    body.classList.add("light");
    localStorage.setItem("mode","light");
  } else {
    body.classList.remove("light");
    body.classList.add("dark");
    localStorage.setItem("mode","dark");
  }
}

// تحميل الوضع المحفوظ
let mode = localStorage.getItem("mode") || "dark";
document.body.className = mode;

</script>

</body>
</html>
