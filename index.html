<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المصحف الشريف</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Amiri", serif;
  overflow: hidden;
  background: #0d0d0d;
  color: white;
}

/* السلايدر الأفقي */
.slider {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}

/* كل صفحة */
.page {
  min-width: 100vw;
  height: 100vh;
  scroll-snap-align: start;
  box-sizing: border-box;
  padding: 20px;
  overflow-y: auto;
  border: 5px solid gold;
}

/* رأس الصفحة */
.header {
  text-align: center;
  border-bottom: 2px solid gold;
  padding-bottom: 10px;
  margin-bottom: 10px;
}

/* الآيات */
.ayah {
  font-size: 22px;
  line-height: 2.2;
  display: block;
}

.basmala {
  text-align: center;
  color: gold;
  font-size: 20px;
  margin: 10px 0;
}
</style>

</head>

<body>

<div class="slider" id="slider"></div>

<script>

let pagesData = {};

// تحميل سورة كاملة (نجمع كل القرآن)
fetch("https://api.alquran.cloud/v1/quran/quran-uthmani")
.then(res => res.json())
.then(data => {

  let ayahs = data.data.ayahs;

  // نجمع حسب رقم الصفحة الحقيقي
  ayahs.forEach(a => {
    let p = a.page;
    if(!pagesData[p]) pagesData[p] = [];
    pagesData[p].push(a);
  });

  buildPages();
});

function buildPages(){
  let slider = document.getElementById("slider");

  Object.keys(pagesData).sort((a,b)=>a-b).forEach(pageNum => {

    let page = document.createElement("div");
    page.className = "page";

    let ayahs = pagesData[pageNum];

    page.innerHTML = `
      <div class="header">صفحة ${pageNum}</div>
      <div class="basmala">بسم الله الرحمن الرحيم</div>
    `;

    ayahs.forEach(a => {
      page.innerHTML += `<div class="ayah">${a.text}</div>`;
    });

    slider.appendChild(page);
  });
}

</script>

</body>
</html>
